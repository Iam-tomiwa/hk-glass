services:
  app:
    container_name: glasstronics-app
    build: .
    expose:
      - "3000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: glasstronics-app-nginx
    ports:
      - "8091:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always


